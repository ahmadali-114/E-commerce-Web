global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['easeshop-prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['easeshop-node-exporter:9100']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['easeshop-auth:3001']

  - job_name: 'product-service'
    static_configs:
      - targets: ['easeshop-product:3002']

  - job_name: 'order-service'
    static_configs:
      - targets: ['easeshop-order:3003']

  - job_name: 'user-service'
    static_configs:
      - targets: ['easeshop-user:3004']

  - job_name: 'admin-service'
    static_configs:
      - targets: ['easeshop-admin:3005']
