global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Add your microservices here if they expose metrics (e.g., /metrics)
  # - job_name: 'auth-service'
  #   static_configs:
  #     - targets: ['auth:3001']
