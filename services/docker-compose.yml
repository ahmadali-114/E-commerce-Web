version: '3.8'

services:
  # MySQL Database (shared across all services)
  mysql:
    image: mysql:8
    container_name: easeshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-easeshop}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
    networks:
      - easeshop-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Auth Service
  auth-service:
    build: ./services/auth
    container_name: easeshop-auth
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-easeshop}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 30d
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - easeshop-net

  # Product Service
  product-service:
    build: ./services/product
    container_name: easeshop-product
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-easeshop}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - easeshop-net

  # Order Service
  order-service:
    build: ./services/order
    container_name: easeshop-order
    restart: unless-stopped
    environment:
      PORT: 3003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-easeshop}
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_URL: http://product-service:3002
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
      product-service:
        condition: service_started
    networks:
      - easeshop-net

  # User Service
  user-service:
    build: ./services/user
    container_name: easeshop-user
    restart: unless-stopped
    environment:
      PORT: 3004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-easeshop}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3004:3004"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - easeshop-net

  # Admin Service (Aggregator)
  admin-service:
    build: ./services/admin
    container_name: easeshop-admin
    restart: unless-stopped
    environment:
      PORT: 3005
      JWT_SECRET: ${JWT_SECRET}
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      USER_SERVICE_URL: http://user-service:3004
    ports:
      - "3005:3005"
    depends_on:
      - product-service
      - order-service
      - user-service
    networks:
      - easeshop-net

  # Nginx API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: easeshop-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"   # if you add SSL later
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - admin-service
    networks:
      - easeshop-net

networks:
  easeshop-net:
    driver: bridge

volumes:
  mysql_data: