events {
    worker_connections 1024;
}

http {
    upstream auth_upstream {
        server auth-service:3001;
    }
    upstream product_upstream {
        server product-service:3002;
    }
    upstream order_upstream {
        server order-service:3003;
    }
    upstream user_upstream {
        server user-service:3004;
    }
    upstream admin_upstream {
        server admin-service:3005;
    }

    server {
        listen 80;
        server_name localhost;

        # Enable CORS (optional, can also be handled by each service)
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'Authorization, Content-Type';

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type';
            return 204;
        }

        # Auth routes
        location /api/auth/ {
            proxy_pass http://auth_upstream/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Product & Category routes (public + admin)
        location /api/products/ {
            proxy_pass http://product_upstream/api/products/;
            proxy_set_header Host $host;
        }
        location /api/categories/ {
            proxy_pass http://product_upstream/api/categories/;
        }

        # Order routes
        location /api/orders/ {
            proxy_pass http://order_upstream/api/orders/;
        }

        # User profile routes
        location /api/users/ {
            proxy_pass http://user_upstream/api/users/;
        }

        # Admin routes (dashboard, charts, etc.)
        location /api/admin/ {
            proxy_pass http://admin_upstream/api/admin/;
        }

        # Health checks (optional, for monitoring)
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}